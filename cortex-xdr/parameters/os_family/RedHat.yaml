# -*- coding: utf-8 -*-
# vim: ft=yaml
#
# Set values specific to:
#   salt['config.get']('os_family') == RedHat.
#
# You just need to add the key:values for this `os_family` that differ
# from `defaults.yaml` + `<osarch>.yaml`.
#
# If you do not need to provide defaults via the `os_family` config,
# you can remove this file or provide at least an empty dict, e.g.
# values: {}
---
values:
  pkg:
    dearchive_path: '/tmp/config-xdr_unroll.d'
    name: 'cortex-agent'
    signing_key: 'https://docs-cortex.paloaltonetworks.com/v/u/cortex-xdr-agent.zip'
    source: ''
    source_hash: ''
  config:
    dir: '/etc/panw'
    file: '/cortex.conf'
    group: 'root'
    owner: 'root'
  service:
    name: 'traps_pmd.service'
    unit_file: '/etc/systemd/system/traps_pmd.service'
...
